name: Deploy to Azure VM

on:
  push:
    branches:
      - main  # Only deploys when you push to the main branch

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy to Azure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZ_VM_IP }}
          username: ${{ secrets.AZ_VM_USER }}
          key: ${{ secrets.AZ_VM_SSH_KEY }}
          port: ${{ secrets.AZ_VM_PORT }}
          script: |
            # 1. Define the directory
            APP_DIR=~/projectfiles/test/raypulse-market-service
            cd $APP_DIR

            # 2. Update code from GitHub
            # Note: Ensure your VM has git credentials or a Deploy Key set up
            git fetch origin main
            git reset --hard origin/main
            
            # 3. Update Python environment
            source venv/bin/activate
            pip install -r requirements.txt
            
            # 4. Restart the Application
            # This kills any existing AngelOne.py process and starts a new one
            echo "Restarting RayPulse Service..."
            pkill -f AngelOne.py || true
            
            # 5. Start with ABSOLUTE paths and touch the log file first
            touch $APP_DIR/output.log
            chmod 666 $APP_DIR/output.log
            
            echo "Starting AngelOne.py..."
            # Using the full path to the python executable inside your venv
            nohup $APP_DIR/venv/bin/python $APP_DIR/AngelOne.py > $APP_DIR/output.log 2>&1 &

            # Give it 2 seconds to see if it crashes immediately
            sleep 2
            if ps aux | grep -v grep | grep "AngelOne.py" > /dev/null
            then
                echo "Process started successfully!"
            else
                echo "ERROR: Process failed to start. Check output.log"
                cat output.log
            fi
