name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy to Azure
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZ_VM_IP }}
          username: ${{ secrets.AZ_VM_USER }}
          key: ${{ secrets.AZ_VM_SSH_KEY }}
          port: ${{ secrets.AZ_VM_PORT }}
          script: |
            # 1. Define the directory with absolute path
            APP_DIR=/home/${{ secrets.AZ_VM_USER }}/projectfiles/test/raypulse-market-service
            cd $APP_DIR

            # 2. Update code - We use a temp backup for .env so it isn't deleted
            [ -f .env ] && cp .env /tmp/.env_backup
            git fetch origin main
            git reset --hard origin/main
            [ -f /tmp/.env_backup ] && mv /tmp/.env_backup .env

            # 3. Update Python environment using absolute venv path
            $APP_DIR/venv/bin/pip install -r requirements.txt
            
            # 4. Kill existing process
            echo "Restarting RayPulse Service..."
            pkill -f AngelOne.py || true
            sleep 2
            
            # 5. Setup Logs
            touch $APP_DIR/output.log
            chmod 666 $APP_DIR/output.log

            # 6. Bulletproof Background Start
            # setsid + redirecting all 3 streams (stdin, stdout, stderr) 
            # is the only way to ensure the process survives SSH logout.
            echo "Launching AngelOne.py..."
            nohup setsid $APP_DIR/venv/bin/python $APP_DIR/AngelOne.py </dev/null >$APP_DIR/output.log 2>&1 &

            # 7. Final Verification
            sleep 5
            if pgrep -f "AngelOne.py" > /dev/null
            then
              echo "✅ Success! Process is running."
              pgrep -a -f "AngelOne.py"
            else
              echo "❌ ERROR: Process failed to stay alive. Last 20 lines of log:"
              tail -n 20 $APP_DIR/output.log
              exit 1
            fi