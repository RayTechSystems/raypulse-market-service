name: Deploy to Azure VM

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: SSH and Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.AZ_VM_IP }}
          username: ${{ secrets.AZ_VM_USER }}
          key: ${{ secrets.AZ_VM_SSH_KEY }}
          port: ${{ secrets.AZ_VM_PORT }}
          # KEY FIX: Pass secrets as env vars so they resolve inside the remote shell
          envs: AZ_VM_USER
          script: |
            set -e
            APP_DIR="/home/$AZ_VM_USER/projectfiles/test/raypulse-market-service"

            echo "--- Pulling latest code ---"
            cd "$APP_DIR"
            [ -f .env ] && cp .env /tmp/.env_backup
            git fetch origin main
            git reset --hard origin/main
            [ -f /tmp/.env_backup ] && mv /tmp/.env_backup .env

            echo "--- Installing dependencies ---"
            "$APP_DIR/venv/bin/pip" install -q -r requirements.txt

            echo "--- Stopping old process ---"
            pkill -f "AngelOne.py" || true
            sleep 2

            echo "--- Starting AngelOne.py ---"
            # nohup alone is sufficient — setsid is not needed here
            nohup "$APP_DIR/venv/bin/python" "$APP_DIR/AngelOne.py" \
              </dev/null \
              >"$APP_DIR/output.log" 2>&1 &

            sleep 5

            echo "--- Verifying process ---"
            if pgrep -f "AngelOne.py" > /dev/null; then
              echo "✅ Deployment successful — process is running."
            else
              echo "❌ Process failed. Last 30 lines of log:"
              tail -n 30 "$APP_DIR/output.log"
              exit 1
            fi