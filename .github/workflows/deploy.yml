name: RayPulse Market Service CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v4
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  deploy:
    name: Deploy to OCI VM
    # needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.OCI_HOST }}
          username: ubuntu
          key: ${{ secrets.OCI_SSH_KEY }}
          script: |
            cd ~/projectfiles/temp/python
            git pull origin main

            # 1. Create the virtual environment if it doesn't exist
            if [ ! -d "venv" ]; then
              python3 -m venv venv
            fi
            
            # 2. Activate and install
            source venv/bin/activate
            
            # 3. Upgrade pip inside the venv (this avoids the externally-managed error)
            pip install -r requirements.txt
            pkill -f freeapp.py || true
            sleep 2
            
            # Start the app and fully DISCONNECT it from the terminal
            # Use 'disown' and redirect all outputs so the SSH session can close
            nohup python3 freeapp.py > freeapp.log 2>&1 &

            # This is the magic part for CI/CD
            disown
            
            echo "Deployed successfully!"

            